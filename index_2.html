<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#C0392B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CRM Ibero">
<title>CRM La Ibero</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f0f0;height:100vh;overflow:hidden}
.screen{display:none;height:100vh;flex-direction:column}
.screen.active{display:flex}
.header{background:#C0392B;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;min-height:54px;flex-shrink:0}
.header h1{font-size:17px;font-weight:600;flex:1}
.header-back{font-size:26px;cursor:pointer;padding:4px 8px 4px 0;line-height:1}
.header-sub{font-size:12px;opacity:.8;margin-top:1px}
.scroll{flex:1;overflow-y:auto;padding:12px}
.dias-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.dia-btn{padding:12px 4px;text-align:center;background:#fff;border:2px solid #e0e0e0;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:#333}
.dia-btn.active{background:#C0392B;border-color:#C0392B;color:#fff}
.search-box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px 14px;font-size:15px;width:100%;margin-bottom:12px}
.cli-card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cli-card:active{background:#f5f5f5}
.cli-nom{font-size:14px;font-weight:500;color:#222}
.cli-num{font-size:12px;color:#888;margin-top:2px}
.cli-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-ok{background:#d5f5e3;color:#1e8449}
.badge-pend{background:#fdebd0;color:#d4820a}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;flex-shrink:0;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:11px 12px;text-align:center;font-size:12px;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:#C0392B;border-bottom-color:#C0392B;font-weight:500}
/* PEDIDO */
.pedido-layout{display:flex;flex-direction:column;height:100%;min-height:0}
.pedido-top{flex:1;overflow-y:auto;padding:12px}
.teclado-fijo{background:#fff;border-top:2px solid #C0392B;padding:6px 10px 8px;flex-shrink:0}
.display{background:#f8f8f8;border:1px solid #ddd;border-radius:8px;padding:5px 10px;margin-bottom:5px}
.display-mode{font-size:11px;color:#888;margin-bottom:2px}
.display-val{font-size:22px;font-weight:600;letter-spacing:2px;color:#222;min-height:26px}
.display-hint{font-size:11px;color:#C0392B;margin-top:2px}
.teclado{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:5px}
.tkey{height:44px;font-size:20px;font-weight:500;border:1px solid #ddd;border-radius:8px;background:#fff;color:#222;cursor:pointer}
.tkey:active{background:#f0f0f0;transform:scale(.96)}
.tkey.wide{grid-column:span 2}
.tkey.del{font-size:16px;background:#f5f5f5}
.btn{width:100%;padding:10px;font-size:14px;font-weight:600;border:none;border-radius:10px;cursor:pointer;margin-bottom:4px}
.btn:active{opacity:.85}
.btn-blue{background:#1a73e8;color:#fff}
.btn-green{background:#1e8449;color:#fff}
.btn-red{background:#C0392B;color:#fff}
.btn-gray{background:#eee;color:#444}
.btn-orange{background:#e67e22;color:#fff}
.btn-sm{padding:7px 12px;font-size:12px;font-weight:500;border:none;border-radius:8px;cursor:pointer;width:auto}
/* ITEMS */
.pedido-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0f0}
.pedido-item:last-child{border:none}
.pi-cod{font-size:14px;font-weight:500}
.pi-qty{font-size:14px;color:#1a73e8;font-weight:600}
.pi-del{background:none;border:none;color:#ccc;font-size:18px;padding:4px 8px;cursor:pointer}
/* HISTORIAL */
.hist-item{padding:10px 0;border-bottom:1px solid #f0f0f0}
.hist-item:last-child{border:none}
.hist-fecha{font-size:12px;color:#888;margin-bottom:3px}
.hist-prods{font-size:13px;color:#444}
.hist-total{font-size:12px;color:#1a73e8;font-weight:500;margin-top:2px}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#fff;border-radius:10px;padding:12px;text-align:center}
.stat-val{font-size:24px;font-weight:600;color:#222}
.stat-label{font-size:11px;color:#888;margin-top:2px}
/* CARD */
.card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.card-title{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;font-weight:500}
.empty{text-align:center;padding:30px 20px;color:#aaa;font-size:14px}
/* MIS PRODUCTOS */
.prod-fav{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.prod-fav:last-child{border:none}
.prod-fav-cod{font-size:14px;font-weight:500;color:#222}
.prod-fav-desc{font-size:12px;color:#888;margin-top:1px}
.prod-fav-acc{display:flex;gap:6px;align-items:center}
.prod-fav-qty{font-size:13px;color:#1a73e8;font-weight:500}
.add-prod-form{background:#f8f8f8;border-radius:10px;padding:12px;margin-bottom:10px}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-input{flex:1;padding:9px 12px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#fff}
/* IA PROMO */
.ia-box{background:linear-gradient(135deg,#1a73e8,#C0392B);border-radius:12px;padding:16px;margin-bottom:12px;color:#fff}
.ia-title{font-size:16px;font-weight:600;margin-bottom:4px}
.ia-sub{font-size:12px;opacity:.8}
.promo-chip{display:inline-block;background:#fff;color:#C0392B;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;margin:4px;cursor:pointer;border:none}
.promo-chip:active{opacity:.8}
.ia-result{background:#fff;border-radius:10px;padding:12px 14px;font-size:13px;color:#333;line-height:1.6;margin-top:10px;white-space:pre-wrap}
.ia-loading{text-align:center;padding:20px;color:#888;font-size:13px}
/* EXPORTAR */
.export-section{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px}
.export-title{font-size:14px;font-weight:600;color:#222;margin-bottom:4px}
.export-sub{font-size:12px;color:#888;margin-bottom:12px}
/* FICHA CLIENTE */
.ficha-field{margin-bottom:10px}
.ficha-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;font-weight:500}
.ficha-value{font-size:15px;color:#222;font-weight:500}
.ficha-input{width:100%;padding:10px 12px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#222;margin-bottom:8px}
.ficha-input:focus{outline:none;border-color:#C0392B}
/* COBRANZAS */
.cobro-item{padding:10px 0;border-bottom:1px solid #f0f0f0}
.cobro-item:last-child{border:none}
.cobro-fecha{font-size:11px;color:#888;margin-bottom:2px}
.cobro-monto{font-size:16px;font-weight:600;color:#1e8449}
.cobro-nota{font-size:13px;color:#444;margin-top:2px}
/* NUEVO CLIENTE */
.fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:#C0392B;color:#fff;font-size:26px;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100}
/* COLOR BADGE */
.color-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
</style>
</head>
<body>

<!-- SCREEN MAIN -->
<div class="screen active" id="screen-main">
  <div class="header"><div><h1>CRM La Ibero</h1><div class="header-sub">Eduardo Cabrera · <span id="fecha-precios">Cargando precios...</span></div></div></div>
  <div class="scroll">
    <div class="dias-grid" id="dias-grid"></div>
    <input class="search-box" type="search" placeholder="Buscar cliente..." id="search" oninput="filtrarClientes(this.value)">
    <div id="lista-clientes"></div>
  </div>
  <button class="fab" onclick="abrirNuevoCliente()" title="Nuevo cliente">+</button>
</div>

<!-- SCREEN NUEVO CLIENTE -->
<div class="screen" id="screen-nuevo-cliente">
  <div class="header">
    <span class="header-back" onclick="volverMain()">‹</span>
    <div style="flex:1"><h1 id="nc-title">Nuevo cliente</h1><div class="header-sub" id="nc-sub">Completá los datos</div></div>
  </div>
  <div class="scroll">
    <div class="card">
      <div class="card-title">Datos del cliente</div>
      <input class="ficha-input" id="nc-nombre" placeholder="Nombre del cliente *" type="text">
      <input class="ficha-input" id="nc-fantasia" placeholder="Nombre de fantasía" type="text">
      <input class="ficha-input" id="nc-numero" placeholder="Número de cliente" type="number" inputmode="numeric">
      <select class="ficha-input" id="nc-dia">
        <option value="">Día de visita</option>
        <option>Lunes</option><option>Martes</option><option>Miercoles</option><option>Jueves</option><option>Viernes</option>
      </select>
      <input class="ficha-input" id="nc-condicion" placeholder="Condición de pago (ej: CC 15 días)" type="text">
      <input class="ficha-input" id="nc-horario" placeholder="Horario de atención" type="text">
      <input class="ficha-input" id="nc-color" placeholder="Color / categoría" type="text">
      <input class="ficha-input" id="nc-telefono" placeholder="Teléfono / WhatsApp" type="tel" inputmode="tel">
    </div>
    <button class="btn btn-red" onclick="guardarNuevoCliente()">Guardar cliente</button>
    <div id="nc-edit-id" style="display:none"></div>
  </div>
</div>

<!-- SCREEN CLIENTE -->
<div class="screen" id="screen-cliente">
  <div class="header">
    <span class="header-back" onclick="volverMain()">‹</span>
    <div style="flex:1"><h1 id="cli-title">Cliente</h1><div class="header-sub" id="cli-sub"></div></div>
    <button onclick="exportarExcel()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer">📊 Excel</button>
  </div>
  <div class="tabs" id="cli-tabs">
    <div class="tab active" onclick="setTab('pedido',this)">Pedido</div>
    <div class="tab" onclick="setTab('productos',this)">Mis productos</div>
    <div class="tab" onclick="setTab('historial',this)">Historial</div>
    <div class="tab" onclick="setTab('cobranzas',this)">Cobranzas</div>
    <div class="tab" onclick="setTab('ficha',this)">Ficha</div>
    <div class="tab" onclick="setTab('ia',this)">IA / Promo</div>
    <div class="tab" onclick="setTab('dia',this)">Día</div>
  </div>
  <div id="tab-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0"></div>
</div>

<script>
const CLIENTES = {
  Lunes:[{num:"28104",nom:"Parkson Wise"},{num:"28100",nom:"Xiongping He"},{num:"28091",nom:"Marina Ortega"},{num:"28078",nom:"Qiaoying Chen"},{num:"7062",nom:"Zheng Mendi"},{num:"27006",nom:"Weng Caixing"},{num:"27029",nom:"Cheng Sheng"},{num:"28088",nom:"Ariel Maximiliano"},{num:"28006",nom:"Ling Enping"},{num:"28106",nom:"Chenggong Dan"},{num:"28098",nom:"Sheng Lin"},{num:"28010",nom:"Redondo Nelida"},{num:"28067",nom:"Maria del Pilar"},{num:"08011",nom:"Arras Marcelo"},{num:"7053",nom:"Oliva y Jamon"},{num:"58003",nom:"Pablo A. Gonzalez"},{num:"28077",nom:"Guido Grossi"},{num:"28072",nom:"Las Tres Primas"},{num:"8537",nom:"Helueni"},{num:"28080",nom:"Jose Luis Unda"}],
  Martes:[{num:"28002",nom:"Marduel Redondo"},{num:"58013",nom:"He Laishui"},{num:"59005",nom:"Pablo Bracho"},{num:"59011",nom:"Ariel Super"},{num:"58017",nom:"Xialing Ling"},{num:"59032",nom:"Aguilera Maria"},{num:"58001",nom:"Delina Hadad"},{num:"59021",nom:"Chaotuan Wang"},{num:"59030",nom:"Proveeduria LR"},{num:"59028",nom:"Dafang Zhang"},{num:"58010",nom:"Maria de los Angeles"},{num:"35031",nom:"Stumpf Matias"},{num:"58015",nom:"Xinguo XU"},{num:"59031",nom:"Wu Wenbin"},{num:"59020",nom:"Maria Gil Duarte"},{num:"59007",nom:"Eligia de la Cruz"},{num:"35017",nom:"Jian Lin"},{num:"35029",nom:"Pascual Miceli"},{num:"59008",nom:"Lacteos el Horizonte"},{num:"59017",nom:"Caixing Du"},{num:"8531",nom:"Azcuenaga 894"},{num:"8501",nom:"La Macarena"},{num:"59004",nom:"Monica Chanchamire"}],
  Miercoles:[{num:"7054",nom:"Qing Lin"},{num:"7058",nom:"Jesus Emilio"},{num:"7511",nom:"Gustavo Keller"},{num:"7037",nom:"Marduel Redondo E."},{num:"7035",nom:"Hecmau"},{num:"07043",nom:"Alberto Pfleger"},{num:"7060",nom:"Mariano Marduel"},{num:"7063",nom:"Aguad Eduardo"},{num:"7052",nom:"Qiuyun Xie"},{num:"7019",nom:"Lianquin Chen"},{num:"7010",nom:"Youqiang Chen"},{num:"7025",nom:"Reale Marcelo"},{num:"7026",nom:"Galeano Segovia"},{num:"8025",nom:"Han Yun"},{num:"7051",nom:"Xiaofeng Wang"},{num:"7055",nom:"Roberto Ariel"},{num:"8018",nom:"Ye Yunzhu"},{num:"10023",nom:"Wu Qiangming"},{num:"10542",nom:"Sergio Alonso"},{num:"10047",nom:"Maoliang Wu"},{num:"7065",nom:"Alimentos Distrib."},{num:"7007",nom:"Diego Campos"},{num:"7030",nom:"Sergio Bassano"}],
  Jueves:[{num:"8067",nom:"Xiaofeng Chen"},{num:"8531",nom:"Azcuenaga 894"},{num:"8545",nom:"Lolison"},{num:"8537",nom:"Helueni"},{num:"8539",nom:"Francisco Bravo"},{num:"8546",nom:"Barca Group"},{num:"8547",nom:"Magnolias Cakes"},{num:"8072",nom:"Guo Lianrong"},{num:"8060",nom:"Carlos Yeregui"},{num:"8550",nom:"8 Sentidos SRL"},{num:"8026",nom:"Xie Wenhui"},{num:"8066",nom:"Juan Burgos"},{num:"08043",nom:"Mingqing Zhang"},{num:"8016",nom:"Lin Huahong"},{num:"28089",nom:"Huahong You"},{num:"8015",nom:"You Huaqin"},{num:"8065",nom:"Alicia Elena"},{num:"28012",nom:"Yu Wenzhen"},{num:"35043",nom:"Liu Yang Xing"}],
  Viernes:[{num:"36048",nom:"Elias Lafuente"},{num:"36053",nom:"Sun Zun Hua"},{num:"36054",nom:"Huang Xianyan"},{num:"36518",nom:"Matediez"},{num:"36510",nom:"EstoEsAmor"},{num:"36049",nom:"Johan Arturo"},{num:"36050",nom:"Julio Minaya"},{num:"36521",nom:"Casco Carmen"},{num:"36527",nom:"JoJo Ventures"},{num:"36535",nom:"Coffe Bar SRL"},{num:"36542",nom:"Xenocast"},{num:"36035",nom:"Lin Yanjun"},{num:"36041",nom:"Sildial"},{num:"36055",nom:"Quicaño Rivas Flor"},{num:"07043",nom:"Alberto Pablo"}]
};
const DIAS = ["Lunes","Martes","Miercoles","Jueves","Viernes"];
let diaActual="Lunes", clienteActual=null, tabActual="pedido";
let modo="cod", input="", codActual="", descActual="";
let pedidoActual=[];
let iaLoading=false;

function loadData(){try{return JSON.parse(localStorage.getItem("crm_ibero")||"{}");}catch(e){return{};}}
function saveData(d){localStorage.setItem("crm_ibero",JSON.stringify(d));}
let DATA=loadData();

const hoy=()=>new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"});
const fechaCompleta=()=>new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});

// ── DÍAS ──
function renderDias(){
  document.getElementById("dias-grid").innerHTML=DIAS.map(d=>
    `<div class="dia-btn ${d===diaActual?'active':''}" onclick="selDia('${d}')">${d.slice(0,3)}</div>`
  ).join("");
}
function selDia(d){diaActual=d;renderDias();filtrarClientes(document.getElementById("search").value);}

// ── CLIENTES ──
function filtrarClientes(q){
  const lista=getClientesDia(diaActual).filter(c=>!q||c.nom.toLowerCase().includes(q.toLowerCase())||c.num.includes(q));
  const h=hoy();
  document.getElementById("lista-clientes").innerHTML=lista.map(c=>{
    const visitado=DATA[`hist_${diaActual}_${c.num}`]?.some(v=>v.fecha===h);
    return `<div class="cli-card" onclick="selCliente('${c.num}','${c.nom.replace(/'/g,"\\'")}')">
      <div><div class="cli-nom">${c.nom}</div><div class="cli-num">${c.num}</div></div>
      <span class="cli-badge ${visitado?'badge-ok':'badge-pend'}">${visitado?'Visitado':'Pendiente'}</span>
    </div>`;
  }).join("");
}

function selCliente(num,nom){
  clienteActual={num,nom};
  pedidoActual=[];modo="cod";input="";codActual="";descActual="";
  document.getElementById("cli-title").textContent=nom;
  document.getElementById("cli-sub").textContent=`N° ${num} · ${diaActual}`;
  showScreen("screen-cliente");
  setTab("pedido",document.querySelector(".tab"));
}
function volverMain(){showScreen("screen-main");filtrarClientes(document.getElementById("search").value);}
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}

// ── TABS ──
function setTab(tab,el){
  tabActual=tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  if(el)el.classList.add("active");
  else document.querySelectorAll(".tab").forEach((t,i)=>{if(["pedido","productos","historial","cobranzas","ficha","ia","dia"][i]===tab)t.classList.add("active");});
  renderTab();
}
function renderTab(){
  const el=document.getElementById("tab-content");
  if(tabActual==="pedido") el.innerHTML=renderPedido();
  else if(tabActual==="productos"){el.innerHTML="";el.appendChild(crearProductos());}
  else if(tabActual==="historial"){el.innerHTML=`<div class="scroll">${renderHistorial()}</div>`;}
  else if(tabActual==="cobranzas"){el.innerHTML=`<div class="scroll">${renderCobranzas()}</div>`;}
  else if(tabActual==="ficha"){el.innerHTML=`<div class="scroll">${renderFicha()}</div>`;}
  else if(tabActual==="ia"){el.innerHTML=`<div class="scroll">${renderIA()}</div>`;}
  else{el.innerHTML=`<div class="scroll">${renderDia()}</div>`;}
}

// ── TECLADO ──
function press(n){if(input.length<6){input+=n;renderTab();}}
function borrar(){
  if(input.length>0)input=input.slice(0,-1);
  else if(modo==="desc"){modo="cod";input=codActual;codActual="";}
  else if(modo==="qty"){modo="desc";input=descActual;descActual="";}
  renderTab();
}
function buscarProducto(cod){
  return LISTA_PRECIOS.find(p=>p.cod===cod)||null;
}

function confirmar(){
  if(!input)return;
  if(modo==="cod"){
    codActual=input;
    const prod=buscarProducto(codActual);
    window._prodActual=prod;
    input="";modo="desc";
  }
  else if(modo==="desc"){descActual=input;input="";modo="qty";}
  else{
    const qty=parseInt(input);
    if(qty>0){
      const ex=pedidoActual.find(p=>p.cod===codActual);
      if(ex){ex.qty+=qty;}
      else{const p=window._prodActual;pedidoActual.push({cod:codActual,desc:descActual,qty,nombre:p?.desc||"",precio:p?.precio||0});}
    }
    codActual="";descActual="";input="";modo="cod";
  }
  renderTab();
}
function eliminarItem(i){pedidoActual.splice(i,1);renderTab();}

function guardarPedido(){
  if(!pedidoActual.length||!clienteActual)return;
  const key=`hist_${diaActual}_${clienteActual.num}`;
  if(!DATA[key])DATA[key]=[];
  DATA[key].unshift({fecha:hoy(),items:[...pedidoActual],total:pedidoActual.reduce((s,i)=>s+i.qty,0)});
  saveData(DATA);
  pedidoActual=[];modo="cod";input="";codActual="";descActual="";
  setTab("historial",null);
  document.querySelectorAll(".tab").forEach((t,i)=>{t.classList.toggle("active",i===2);});
}

// ── RENDER PEDIDO ──
function renderPedido(){
  const items=pedidoActual;
  const modoLabel=modo==="cod"?"Código del producto":modo==="desc"?"Descuento (%)":"Cantidad de unidades";
  const prod=window._prodActual;
  const prodInfo=prod?` — ${prod.desc} · $${prod.precio.toLocaleString('es-AR')}`:"";
  const hint=modo==="desc"?`Cód: ${codActual}${prodInfo}`:modo==="qty"?`Cód: ${codActual} · Desc: ${descActual}%`:"";
  return `
  <div class="pedido-layout">
    <div class="pedido-top">
      ${items.length?`
        <div class="card">
          <div class="card-title">Pedido de hoy — ${hoy()}</div>
          ${items.map((it,i)=>`
            <div class="pedido-item">
              <div>
                <div class="pi-cod">Cód. ${it.cod}${it.nombre?` — ${it.nombre}`:''}</div>
                <div style="font-size:11px;color:#888">Desc: ${it.desc}%${it.precio?` · $${parseInt(it.precio).toLocaleString('es-AR')} c/u`:''}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <span class="pi-qty">${it.qty} u.</span>
                <button class="pi-del" onclick="eliminarItem(${i})">✕</button>
              </div>
            </div>`).join("")}

// ── EXPORTAR EXCEL ──
function exportarExcel(){
  const key=`hist_${diaActual}_${clienteActual?.num}`;
  const hist=DATA[key]||[];
  if(!hist.length){alert("No hay historial para exportar.");return;}

  // Armar CSV
  const fechas=[...new Set(hist.map(h=>h.fecha))].sort();
  const codigos=[...new Set(hist.flatMap(h=>h.items.map(i=>i.cod)))];

  let csv=`Código,Descuento%,${fechas.join(",")},Total Unidades\n`;
  codigos.forEach(cod=>{
    const descRow=hist.flatMap(h=>h.items).find(i=>i.cod===cod)?.desc||"0";
    const qtys=fechas.map(f=>{
      const visita=hist.find(h=>h.fecha===f);
      const item=visita?.items.find(i=>i.cod===cod);
      return item?item.qty:"";
    });
    const total=qtys.reduce((s,q)=>s+(parseInt(q)||0),0);
    csv+=`${cod},${descRow}%,${qtys.join(",")},${total}\n`;
  });

  // Descargar CSV
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`${clienteActual.nom.replace(/ /g,"_")}_${diaActual}_historial.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

  if(!nombre){alert("El nombre es obligatorio.");return;}

  const editId=document.getElementById("nc-edit-id").textContent;

    horario:document.getElementById("nc-horario").value.trim(),
    color:document.getElementById("nc-color").value.trim(),
    telefono:document.getElementById("nc-telefono").value.trim()
  };

  // Agregar a lista de clientes extras si es nuevo
  const extKey=`clientes_extra_${dia}`;
  if(!esEdicion){
    if(!DATA[extKey])DATA[extKey]=[];
    if(!DATA[extKey].find(c=>c.num===numFinal)){
      DATA[extKey].push({num:numFinal,nom:nombre});
    }
  } else {
    // Actualizar nombre si cambió
    const extKeys=Object.keys(DATA).filter(k=>k.startsWith("clientes_extra_"));
    extKeys.forEach(k=>{
      const idx=DATA[k].findIndex(c=>c.num===editId);
      if(idx>=0)DATA[k][idx].nom=nombre;
    });
  }

  saveData(DATA);
  alert(esEdicion?"Cliente actualizado ✓":"Cliente agregado ✓");
  volverMain();
}

// ── OBTENER LISTA DE CLIENTES (incluye extras) ──
function getClientesDia(dia){
  const base=CLIENTES[dia]||[];
  const extra=DATA[`clientes_extra_${dia}`]||[];
  return [...base,...extra];
}

// INIT — cargar precios desde JSON externo
let LISTA_PRECIOS = [];
fetch('precios.json')
  .then(r => r.json())
  .then(data => {
    LISTA_PRECIOS = data.productos || [];
    console.log(`Precios cargados: ${LISTA_PRECIOS.length} productos (${data.fecha_actualizacion})`);
    // Mostrar fecha de actualización
    const el = document.getElementById('fecha-precios');
    if(el) el.textContent = `Lista de precios: ${data.fecha_actualizacion}`;
  })
  .catch(() => {
    console.warn('No se pudo cargar precios.json');
  });

renderDias();
filtrarClientes("");
</script>
