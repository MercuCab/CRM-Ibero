<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C0392B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CRM Ibero">
<title>CRM La Ibero</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f0f0;height:100vh;overflow:hidden}
.screen{display:none;height:100vh;flex-direction:column}
.pedido-layout{display:flex;flex-direction:column;height:100%}
.pedido-top{flex:1;overflow-y:auto;padding:12px}
.teclado-fijo{background:#fff;border-top:1px solid #e0e0e0;padding:10px 12px;padding-bottom:max(12px, env(safe-area-inset-bottom))}
.screen.active{display:flex}
/* HEADER */
.header{background:#C0392B;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;min-height:54px}
.header h1{font-size:17px;font-weight:600;flex:1}
.header-back{font-size:22px;cursor:pointer;padding:4px 8px 4px 0}
.header-sub{font-size:12px;opacity:.8;margin-top:1px}
/* CONTENT */
.scroll{flex:1;overflow-y:auto;padding:12px}
/* DIAS */
.dias-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.dia-btn{padding:12px 4px;text-align:center;background:#fff;border:2px solid #e0e0e0;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:#333}
.dia-btn.active{background:#C0392B;border-color:#C0392B;color:#fff}
/* CLIENTES */
.search-box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px 14px;font-size:15px;width:100%;margin-bottom:12px}
.cli-card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cli-card:active{background:#f5f5f5}
.cli-nom{font-size:14px;font-weight:500;color:#222}
.cli-num{font-size:12px;color:#888;margin-top:2px}
.cli-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-ok{background:#d5f5e3;color:#1e8449}
.badge-pend{background:#fdebd0;color:#d4820a}
/* TABS */
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;cursor:pointer;color:#888;border-bottom:2px solid transparent}
.tab.active{color:#C0392B;border-bottom-color:#C0392B;font-weight:500}
/* TECLADO */
.display{background:#f8f8f8;border:1px solid #ddd;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.display-mode{font-size:11px;color:#888;margin-bottom:4px}
.display-val{font-size:32px;font-weight:600;letter-spacing:3px;color:#222;min-height:40px}
.display-hint{font-size:12px;color:#C0392B;margin-top:4px}
.teclado{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.tkey{height:60px;font-size:24px;font-weight:500;border:1px solid #ddd;border-radius:10px;background:#fff;color:#222;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tkey:active{background:#f0f0f0;transform:scale(.96)}
.tkey.wide{grid-column:span 2}
.tkey.del{font-size:18px;background:#f5f5f5}
/* BOTONES */
.btn{width:100%;padding:14px;font-size:15px;font-weight:600;border:none;border-radius:10px;cursor:pointer;margin-top:8px}
.btn-blue{background:#1a73e8;color:#fff}
.btn-green{background:#1e8449;color:#fff}
.btn-red{background:#C0392B;color:#fff}
.btn-gray{background:#eee;color:#333}
.btn:active{opacity:.85;transform:scale(.99)}
/* PEDIDO ITEMS */
.pedido-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.pedido-item:last-child{border:none}
.pi-cod{font-size:15px;font-weight:500}
.pi-qty{font-size:15px;color:#1a73e8;font-weight:600}
.pi-del{background:none;border:none;color:#ccc;font-size:18px;padding:4px 8px;cursor:pointer}
/* HISTORIAL */
.hist-item{padding:10px 0;border-bottom:1px solid #f0f0f0}
.hist-item:last-child{border:none}
.hist-fecha{font-size:12px;color:#888;margin-bottom:3px}
.hist-prods{font-size:13px;color:#444}
.hist-total{font-size:12px;color:#1a73e8;font-weight:500;margin-top:2px}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#fff;border-radius:10px;padding:12px;text-align:center}
.stat-val{font-size:24px;font-weight:600;color:#222}
.stat-label{font-size:11px;color:#888;margin-top:2px}
/* CARD */
.card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.card-title{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;font-weight:500}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:#aaa;font-size:14px}
/* RESUMEN EXPORTAR */
.export-box{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:12px 14px;margin-top:12px;font-size:13px;color:#2e7d32}
</style>
</head>
<body>

<!-- SCREEN 1: SELECTOR DE DÍA Y CLIENTE -->
<div class="screen active" id="screen-main">
  <div class="header">
    <div>
      <h1>CRM La Ibero</h1>
      <div class="header-sub">Eduardo Cabrera</div>
    </div>
  </div>
  <div class="scroll">
    <div class="dias-grid" id="dias-grid"></div>
    <input class="search-box" type="search" placeholder="Buscar cliente..." id="search" oninput="filtrarClientes(this.value)">
    <div id="lista-clientes"></div>
  </div>
</div>

<!-- SCREEN 2: CLIENTE (pedido + historial + resumen) -->
<div class="screen" id="screen-cliente">
  <div class="header">
    <span class="header-back" onclick="volverMain()">‹</span>
    <div style="flex:1">
      <h1 id="cli-title">Cliente</h1>
      <div class="header-sub" id="cli-sub"></div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setTab('pedido',this)">Pedido</div>
    <div class="tab" onclick="setTab('historial',this)">Historial</div>
    <div class="tab" onclick="setTab('resumen',this)">Día</div>
  </div>
  <div id="tab-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0"></div>
</div>

<script>
const CLIENTES = {
  Lunes:[{num:"28104",nom:"Parkson Wise"},{num:"28100",nom:"Xiongping He"},{num:"28091",nom:"Marina Ortega"},{num:"28078",nom:"Qiaoying Chen"},{num:"7062",nom:"Zheng Mendi"},{num:"27006",nom:"Weng Caixing"},{num:"27029",nom:"Cheng Sheng"},{num:"28088",nom:"Ariel Maximiliano"},{num:"28006",nom:"Ling Enping"},{num:"28106",nom:"Chenggong Dan"},{num:"28098",nom:"Sheng Lin"},{num:"28010",nom:"Redondo Nelida"},{num:"28067",nom:"Maria del Pilar"},{num:"08011",nom:"Arras Marcelo"},{num:"7053",nom:"Oliva y Jamon"},{num:"58003",nom:"Pablo A. Gonzalez"},{num:"28077",nom:"Guido Grossi"},{num:"28072",nom:"Las Tres Primas"},{num:"8537",nom:"Helueni"},{num:"28080",nom:"Jose Luis Unda"}],
  Martes:[{num:"28002",nom:"Marduel Redondo"},{num:"58013",nom:"He Laishui"},{num:"59005",nom:"Pablo Bracho"},{num:"59011",nom:"Ariel Super"},{num:"58017",nom:"Xialing Ling"},{num:"59032",nom:"Aguilera Maria"},{num:"58001",nom:"Delina Hadad"},{num:"59021",nom:"Chaotuan Wang"},{num:"59030",nom:"Proveeduria LR"},{num:"59028",nom:"Dafang Zhang"},{num:"58010",nom:"Maria de los Angeles"},{num:"35031",nom:"Stumpf Matias"},{num:"58015",nom:"Xinguo XU"},{num:"59031",nom:"Wu Wenbin"},{num:"59020",nom:"Maria Gil Duarte"},{num:"59007",nom:"Eligia de la Cruz"},{num:"35017",nom:"Jian Lin"},{num:"35029",nom:"Pascual Miceli"},{num:"59008",nom:"Lacteos el Horizonte"},{num:"59017",nom:"Caixing Du"},{num:"8531",nom:"Azcuenaga 894"},{num:"8501",nom:"La Macarena"},{num:"59004",nom:"Monica Chanchamire"}],
  Miercoles:[{num:"7054",nom:"Qing Lin"},{num:"7058",nom:"Jesus Emilio"},{num:"7511",nom:"Gustavo Keller"},{num:"7037",nom:"Marduel Redondo E."},{num:"7035",nom:"Hecmau"},{num:"07043",nom:"Alberto Pfleger"},{num:"7060",nom:"Mariano Marduel"},{num:"7063",nom:"Aguad Eduardo"},{num:"7052",nom:"Qiuyun Xie"},{num:"7019",nom:"Lianquin Chen"},{num:"7010",nom:"Youqiang Chen"},{num:"7025",nom:"Reale Marcelo"},{num:"7026",nom:"Galeano Segovia"},{num:"8025",nom:"Han Yun"},{num:"7051",nom:"Xiaofeng Wang"},{num:"7055",nom:"Roberto Ariel"},{num:"8018",nom:"Ye Yunzhu"},{num:"10023",nom:"Wu Qiangming"},{num:"10542",nom:"Sergio Alonso"},{num:"10047",nom:"Maoliang Wu"},{num:"7065",nom:"Alimentos Distrib."},{num:"7007",nom:"Diego Campos"},{num:"7030",nom:"Sergio Bassano"}],
  Jueves:[{num:"8067",nom:"Xiaofeng Chen"},{num:"8531",nom:"Azcuenaga 894"},{num:"8545",nom:"Lolison"},{num:"8537",nom:"Helueni"},{num:"8539",nom:"Francisco Bravo"},{num:"8546",nom:"Barca Group"},{num:"8547",nom:"Magnolias Cakes"},{num:"8072",nom:"Guo Lianrong"},{num:"8060",nom:"Carlos Yeregui"},{num:"8550",nom:"8 Sentidos SRL"},{num:"8026",nom:"Xie Wenhui"},{num:"8066",nom:"Juan Burgos"},{num:"08043",nom:"Mingqing Zhang"},{num:"8016",nom:"Lin Huahong"},{num:"28089",nom:"Huahong You"},{num:"8015",nom:"You Huaqin"},{num:"8065",nom:"Alicia Elena"},{num:"28012",nom:"Yu Wenzhen"},{num:"35043",nom:"Liu Yang Xing"}],
  Viernes:[{num:"36048",nom:"Elias Lafuente"},{num:"36053",nom:"Sun Zun Hua"},{num:"36054",nom:"Huang Xianyan"},{num:"36518",nom:"Matediez"},{num:"36510",nom:"EstoEsAmor"},{num:"36049",nom:"Johan Arturo"},{num:"36050",nom:"Julio Minaya"},{num:"36521",nom:"Casco Carmen"},{num:"36527",nom:"JoJo Ventures"},{num:"36535",nom:"Coffe Bar SRL"},{num:"36542",nom:"Xenocast"},{num:"36035",nom:"Lin Yanjun"},{num:"36041",nom:"Sildial"},{num:"36055",nom:"Quicaño Rivas Flor"},{num:"07043",nom:"Alberto Pablo"}]
};

const DIAS = ["Lunes","Martes","Miercoles","Jueves","Viernes"];
let diaActual = "Lunes";
let clienteActual = null;
let tabActual = "pedido";
let modo = "cod", input = "", codActual = "";
let pedidoActual = [];

function loadData() { try { return JSON.parse(localStorage.getItem("crm_ibero")||"{}"); } catch(e){return{};} }
function saveData(d) { localStorage.setItem("crm_ibero", JSON.stringify(d)); }
let DATA = loadData();

const hoy = () => new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"});

// DÍAS
function renderDias() {
  document.getElementById("dias-grid").innerHTML = DIAS.map(d =>
    `<div class="dia-btn ${d===diaActual?'active':''}" onclick="selDia('${d}')">${d.slice(0,3)}</div>`
  ).join("");
}

function selDia(d) {
  diaActual = d;
  renderDias();
  filtrarClientes(document.getElementById("search").value);
}

// CLIENTES
function filtrarClientes(q) {
  const lista = (CLIENTES[diaActual]||[]).filter(c =>
    !q || c.nom.toLowerCase().includes(q.toLowerCase()) || c.num.includes(q)
  );
  const h = hoy();
  document.getElementById("lista-clientes").innerHTML = lista.map(c => {
    const visitado = DATA[`${diaActual}-${c.num}`]?.some(v=>v.fecha===h);
    return `<div class="cli-card" onclick="selCliente('${c.num}','${c.nom.replace(/'/g,"\\'")}')">
      <div><div class="cli-nom">${c.nom}</div><div class="cli-num">${c.num}</div></div>
      <span class="cli-badge ${visitado?'badge-ok':'badge-pend'}">${visitado?'Visitado':'Pendiente'}</span>
    </div>`;
  }).join("");
}

function selCliente(num, nom) {
  clienteActual = {num, nom};
  pedidoActual = [];
  modo = "cod"; input = ""; codActual = "";
  document.getElementById("cli-title").textContent = nom;
  document.getElementById("cli-sub").textContent = `N° ${num} · ${diaActual}`;
  showScreen("screen-cliente");
  setTab("pedido", document.querySelector(".tab"));
}

function volverMain() {
  showScreen("screen-main");
  filtrarClientes(document.getElementById("search").value);
}

// SCREENS
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// TABS
function setTab(tab, el) {
  tabActual = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if(el) el.classList.add("active");
  renderTab();
}

function renderTab() {
  const el = document.getElementById("tab-content");
  if(tabActual==="pedido") el.innerHTML = renderPedido();
  else if(tabActual==="historial") el.innerHTML = renderHistorial();
  else el.innerHTML = renderResumen();
}

// TECLADO
function press(n) { if(input.length<6){input+=n; renderTab();} }
function borrar() {
  if(input.length>0){input=input.slice(0,-1);}
  else if(modo==="qty"){modo="cod";input=codActual;codActual="";}
  renderTab();
}
function confirmar() {
  if(!input) return;
  if(modo==="cod"){codActual=input;input="";modo="qty";}
  else {
    const qty=parseInt(input);
    if(qty>0){
      const ex=pedidoActual.find(p=>p.cod===codActual);
      if(ex) ex.qty+=qty;
      else pedidoActual.push({cod:codActual,qty});
    }
    codActual="";input="";modo="cod";
  }
  renderTab();
}

function eliminarItem(i) { pedidoActual.splice(i,1); renderTab(); }

function guardarPedido() {
  if(!pedidoActual.length||!clienteActual) return;
  const key = `${diaActual}-${clienteActual.num}`;
  if(!DATA[key]) DATA[key]=[];
  DATA[key].unshift({fecha:hoy(),items:[...pedidoActual],total:pedidoActual.reduce((s,i)=>s+i.qty,0)});
  saveData(DATA);
  pedidoActual=[];modo="cod";input="";codActual="";
  setTab("historial",null);
  document.querySelectorAll(".tab").forEach((t,i)=>{t.classList.toggle("active",i===1)});
}

// RENDER PEDIDO
function renderPedido() {
  const items = pedidoActual;
  const h = hoy();
  return `
  <div class="pedido-layout">
    <div class="pedido-top">
      ${items.length ? `
        <div class="card">
          <div class="card-title">Pedido de hoy — ${h}</div>
          ${items.map((it,i)=>`
            <div class="pedido-item">
              <div class="pi-cod">Cód. ${it.cod}</div>
              <div style="display:flex;align-items:center;gap:10px">
                <span class="pi-qty">${it.qty} u.</span>
                <button class="pi-del" onclick="eliminarItem(${i})">✕</button>
              </div>
            </div>`).join("")}
          <div style="padding:10px 0 0;border-top:1px solid #eee;display:flex;justify-content:space-between;font-size:14px">
            <span style="color:#888">Total</span>
            <span style="font-weight:600">${items.reduce((s,i)=>s+i.qty,0)} unidades</span>
          </div>
          <button class="btn btn-green" onclick="guardarPedido()">Guardar visita</button>
        </div>` : 
        `<div class="empty">Usá el teclado de abajo para ingresar el código y la cantidad</div>`
      }
    </div>
    <div class="teclado-fijo">
      <div class="display">
        <div class="display-mode">${modo==="cod"?"Código del producto":"Cantidad de unidades"}${codActual?" — cód. "+codActual:""}</div>
        <div class="display-val">${input||"_"}</div>
      </div>
      <div class="teclado">
        <button class="tkey" onclick="press('7')">7</button>
        <button class="tkey" onclick="press('8')">8</button>
        <button class="tkey" onclick="press('9')">9</button>
        <button class="tkey" onclick="press('4')">4</button>
        <button class="tkey" onclick="press('5')">5</button>
        <button class="tkey" onclick="press('6')">6</button>
        <button class="tkey" onclick="press('1')">1</button>
        <button class="tkey" onclick="press('2')">2</button>
        <button class="tkey" onclick="press('3')">3</button>
        <button class="tkey wide" onclick="press('0')">0</button>
        <button class="tkey del" onclick="borrar()">⌫</button>
      </div>
      <button class="btn btn-blue" style="margin-top:8px" onclick="confirmar()">
        ${modo==="cod"?"Confirmar código →":"+ Agregar al pedido"}
      </button>
    </div>
  </div>
  `;
}

// RENDER HISTORIAL
function renderHistorial() {
  const key = `${diaActual}-${clienteActual?.num}`;
  const hist = DATA[key]||[];
  const totalVisitas = hist.length;
  const totalUnidades = hist.reduce((s,h)=>s+h.total,0);
  return `
    <div class="stats">
      <div class="stat"><div class="stat-val">${totalVisitas}</div><div class="stat-label">Visitas</div></div>
      <div class="stat"><div class="stat-val">${totalUnidades}</div><div class="stat-label">Unidades</div></div>
      <div class="stat"><div class="stat-val" style="font-size:16px">${hist[0]?.fecha||"—"}</div><div class="stat-label">Última</div></div>
    </div>
    <div class="card">
      <div class="card-title">Historial de visitas</div>
      ${hist.length?hist.map(h=>`
        <div class="hist-item">
          <div class="hist-fecha">${h.fecha}</div>
          <div class="hist-prods">${h.items.map(i=>`${i.cod} x${i.qty}`).join(" · ")}</div>
          <div class="hist-total">${h.total} unidades</div>
        </div>`).join(""):
        `<div class="empty">Sin visitas registradas todavía.<br>Cargá el primer pedido.</div>`}
    </div>
    ${hist.length?`<button class="btn btn-gray" onclick="exportarCliente()">Copiar resumen para Claude ↗</button>`:""}
  `;
}

// RENDER RESUMEN DEL DÍA
function renderResumen() {
  const h = hoy();
  const lista = CLIENTES[diaActual]||[];
  const visitados = lista.filter(c=>DATA[`${diaActual}-${c.num}`]?.some(v=>v.fecha===h));
  const pendientes = lista.filter(c=>!DATA[`${diaActual}-${c.num}`]?.some(v=>v.fecha===h));
  const totalU = visitados.reduce((s,c)=>{
    const v=DATA[`${diaActual}-${c.num}`]?.find(v=>v.fecha===h);
    return s+(v?.total||0);
  },0);
  return `
    <div class="stats">
      <div class="stat"><div class="stat-val">${lista.length}</div><div class="stat-label">Clientes</div></div>
      <div class="stat"><div class="stat-val" style="color:#1e8449">${visitados.length}</div><div class="stat-label">Visitados</div></div>
      <div class="stat"><div class="stat-val" style="color:#d4820a">${pendientes.length}</div><div class="stat-label">Pendientes</div></div>
    </div>
    ${pendientes.length?`
    <div class="card">
      <div class="card-title">Pendientes de visita</div>
      ${pendientes.map(c=>`
        <div class="cli-card" style="margin-bottom:6px;box-shadow:none;border:1px solid #f0e0c0" onclick="selClienteDesdeResumen('${c.num}','${c.nom.replace(/'/g,"\\'")}')">
          <div><div class="cli-nom">${c.nom}</div><div class="cli-num">${c.num}</div></div>
          <span class="cli-badge badge-pend">Pendiente</span>
        </div>`).join("")}
    </div>`:""}
    ${visitados.length?`
    <div class="card">
      <div class="card-title">Visitados hoy · ${totalU} unidades totales</div>
      ${visitados.map(c=>{
        const v=DATA[`${diaActual}-${c.num}`]?.find(v=>v.fecha===h);
        return`<div class="pedido-item"><div><div class="pi-cod">${c.nom}</div><div style="font-size:12px;color:#888">${v?.items.map(i=>`${i.cod} x${i.qty}`).join(" · ")||""}</div></div><span class="cli-badge badge-ok">${v?.total||0} u.</span></div>`;
      }).join("")}
    </div>`:""}
    <button class="btn btn-gray" style="margin-top:4px" onclick="exportarDia()">Copiar resumen del día para Claude ↗</button>
  `;
}

function selClienteDesdeResumen(num, nom) { selCliente(num, nom); }

function exportarCliente() {
  const key = `${diaActual}-${clienteActual?.num}`;
  const hist = DATA[key]||[];
  if(!hist.length) return;
  const txt = `Historial ${clienteActual.nom} (${clienteActual.num}) — ${diaActual}:\n`+
    hist.map(h=>`${h.fecha}: ${h.items.map(i=>`${i.cod} x${i.qty}`).join(", ")} (${h.total} u.)`).join("\n");
  navigator.clipboard?.writeText(txt).catch(()=>{});
  alert("Resumen copiado. Pegalo en el chat con Claude.");
}

function exportarDia() {
  const h = hoy();
  const lista = CLIENTES[diaActual]||[];
  const visitados = lista.filter(c=>DATA[`${diaActual}-${c.num}`]?.some(v=>v.fecha===h));
  if(!visitados.length){alert("No hay pedidos registrados hoy.");return;}
  const txt = `Resumen ${diaActual} ${h}:\n`+
    visitados.map(c=>{
      const v=DATA[`${diaActual}-${c.num}`]?.find(v=>v.fecha===h);
      return `${c.nom} (${c.num}): ${v?.items.map(i=>`${i.cod} x${i.qty}`).join(", ")} — ${v?.total} u.`;
    }).join("\n");
  navigator.clipboard?.writeText(txt).catch(()=>{});
  alert("Resumen del día copiado. Pegalo en el chat con Claude para procesar.");
}

// SERVICE WORKER
if("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

// INIT
renderDias();
filtrarClientes("");
</script>
</body>
</html>
